<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discography Downloader</title>
    <style>
        :root {
            --bg: #f5f5f5; --surface: #fff; --border: #ddd; --text: #222;
            --text2: #666; --primary: #4f46e5; --primary-hover: #4338ca;
            --danger: #dc2626; --success: #16a34a; --warning: #d97706;
            --info: #0891b2; --input-bg: #fff;
        }
        [data-theme="dark"] {
            --bg: #0f0f0f; --surface: #1a1a1a; --border: #333;
            --text: #e5e5e5; --text2: #999; --input-bg: #262626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

        .app { max-width: 960px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header-btns { display: flex; gap: 8px; }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 12px; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* Inputs */
        .input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: var(--input-bg); color: var(--text); }
        .input:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
        select.input { appearance: none; }

        /* Form grid */
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
        .form-group.flex-1 { flex: 1; min-width: 150px; }

        /* Checkbox rows */
        .check-row { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
        .check-row label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }

        /* Status bar */
        .status-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); }
        .status-dot.active { background: var(--success); animation: pulse 1.5s infinite; }
        .status-dot.paused { background: var(--warning); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .status-text { font-size: 14px; color: var(--text2); }

        /* Progress bars */
        .progress-item { margin-bottom: 12px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }

        /* Log box */
        .log-box { background: #000; color: #0f0; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; padding: 12px; border-radius: 6px; height: 350px; overflow-y: auto; white-space: pre-wrap; line-height: 1.4; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 8px 10px; color: var(--text2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--border); }
        td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--border); }

        /* Review tree */
        .tree-panel { max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-top: 12px; }
        .tree-panel ul { list-style: none; padding-left: 20px; }
        .tree-panel > ul { padding-left: 0; }
        .tree-panel li { margin: 4px 0; }
        .tree-panel .artist-name { font-weight: 600; }
        .tree-panel .exists { color: var(--text2); text-decoration: line-through; }
        .tree-panel .badge-sm { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--text2); color: #fff; margin-left: 6px; }

        /* Collapsible settings */
        .settings-body { display: none; margin-top: 16px; }
        .settings-body.open { display: block; }
        .settings-toggle { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .settings-toggle::after { content: '▸'; transition: transform 0.2s; }
        .settings-toggle.open::after { transform: rotate(90deg); }

        @media (max-width: 640px) {
            .form-row { flex-direction: column; }
            .form-group.flex-1 { min-width: 100%; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- Header -->
    <div class="header">
        <h1>🎵 Discography Downloader <span style="font-size: 12px; color: var(--text2); vertical-align: middle;">v{{ version }}</span></h1>
        <div class="header-btns">
            <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">🌗 Theme</button>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Idle</span>
    </div>

    <!-- Control Panel -->
    <div class="card">
        <div class="card-title">Download</div>
        <div class="form-row" style="margin-bottom: 12px;">
            <div class="form-group flex-1">
                <label>Artist(s) — comma separated</label>
                <input type="text" class="input" id="artistName" placeholder="e.g. Radiohead, GMS, Transwave">
            </div>
            <div class="form-group">
                <label>Related Depth</label>
                <input type="number" class="input" id="relatedDepth" value="1" min="0" max="5" style="width: 70px;">
            </div>
            <div class="form-group" style="justify-content: end;">
                <label>&nbsp;</label>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button class="btn btn-primary" id="startBtn" onclick="startJob()">▶ Start</button>
                    <button class="btn btn-ghost" id="scanBtn" onclick="scanArtist()">🔍 Scan</button>
                    <button class="btn btn-ghost" id="fillBtn" onclick="startAutonomousFill()">🧩 Fill Gaps</button>
                    <button class="btn btn-warning" id="pauseBtn" onclick="togglePause()" style="display:none;">⏸ Pause</button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopJob()" style="display:none;">⏹ Stop</button>
                </div>
            </div>
        </div>
        <div class="check-row">
            <label><input type="checkbox" id="dryRun"> Dry run (no downloads)</label>
        </div>

        <!-- Review Tree (hidden until scan) -->
        <div class="tree-panel" id="reviewSection" style="display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
                <strong>Review Selection</strong>
                <button class="btn btn-success btn-sm" onclick="startJob(true)">✓ Download Selected</button>
            </div>
            <div id="treeRoot"></div>
        </div>
    </div>

    <!-- Active Progress -->
    <div class="card" id="progressCard" style="display: none;">
        <div class="card-title">Progress</div>
        <div id="progressContainer"></div>
    </div>

    <!-- Live Logs -->
    <div class="card">
        <div class="card-title">Logs</div>
        <div class="log-box" id="logBox">Waiting for input...</div>
    </div>

    <!-- Completed Downloads -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="card-title" style="margin-bottom: 0;">Download History</div>
            <button class="btn btn-ghost btn-sm" onclick="clearQueue()">Clear History</button>
        </div>
        <div class="table-wrap" style="margin-top: 12px;">
            <table>
                <thead>
                    <tr><th>Artist</th><th>Album</th><th>Year</th><th>Status</th></tr>
                </thead>
                <tbody id="completedBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Library Browser -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="card-title" style="margin-bottom: 0;">Library</div>
            <button class="btn btn-ghost btn-sm" onclick="loadLibrary()">Refresh</button>
        </div>
        <div id="libraryContent" style="margin-top: 12px; max-height: 400px; overflow-y: auto;">
            <p style="color: var(--text2); font-size: 13px;">Click Refresh to browse your library.</p>
        </div>
    </div>

    <!-- Settings (collapsed) -->
    <div class="card">
        <div class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
            <div class="card-title" style="margin-bottom: 0;">Settings</div>
        </div>
        <div class="settings-body" id="settingsBody">
            <div class="form-row" style="margin-top: 4px;">
                <div class="form-group flex-1">
                    <label>Soulseek Username</label>
                    <input type="text" class="input" id="slskUser">
                </div>
                <div class="form-group flex-1">
                    <label>Soulseek Password</label>
                    <input type="password" class="input" id="slskPass">
                </div>
                <div class="form-group">
                    <label>Preferred Format</label>
                    <select class="input" id="prefFormat">
                        <option value="flac">FLAC</option>
                        <option value="mp3">MP3 (320kbps)</option>
                    </select>
                </div>
            </div>
            <div class="check-row" style="margin-top: 12px;">
                <label><input type="checkbox" id="acoustidEnabled"> AcoustID Fallback</label>
                <label><input type="checkbox" id="acoustidVerify"> Strict AcoustID Verification</label>
                <label><input type="checkbox" id="sentinelEnabled"> Neural Audio Sentinel (Fake FLAC Detection)</label>
                <label><input type="checkbox" id="embedLyrics"> Embed Lyrics</label>
                <label><input type="checkbox" id="convertMp3"> Auto-Convert FLAC → MP3 V0</label>
            </div>
            <div class="form-row" style="margin-top: 12px;">
                <div class="form-group flex-1">
                    <label>AcoustID API Key</label>
                    <input type="text" class="input" id="acoustidKey">
                </div>
                <div class="form-group flex-1">
                    <label>Genius API Token (optional)</label>
                    <input type="text" class="input" id="geniusApiKey">
                </div>
            </div>
            <div style="margin-top: 16px;">
                <button class="btn btn-primary btn-sm" onclick="saveConfig()">Save Settings</button>
                <button class="btn btn-ghost btn-sm" onclick="testSearch()">🔍 Test Search</button>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
            <button class="btn btn-ghost btn-sm" onclick="tidyLibrary()">📦 Tidy Flat Files</button>
            <button class="btn btn-primary btn-sm" onclick="oneClickClean()">✨ One-Click Clean All</button>
            <button class="btn btn-primary btn-sm" onclick="organizeAlbums()">📂 Organize Albums</button>
            <button class="btn btn-primary btn-sm" onclick="organizeRoot()">📂 Organize Root Files</button>
            <button class="btn btn-ghost btn-sm" onclick="organizeByTags()">🏷 Organize by Tags</button>
            <button class="btn btn-ghost btn-sm" onclick="cleanupIncomplete()">🧹 Cleanup Incomplete</button>
            <button class="btn btn-ghost btn-sm" onclick="deduplicateLibrary()">🗑 Deduplicate</button>
            <button class="btn btn-ghost btn-sm" onclick="cleanupEmpty()">🧹 Clean Empty Folders</button>
            <span id="statsText" style="font-size: 12px; color: var(--text2); align-self: center;"></span>
        </div>
    </div>

</div>

<script>
// ─── DOM refs ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const logBox = $('logBox');
const statusDot = $('statusDot');
const statusText = $('statusText');

let ws = null;
let scanResult = null;

// ─── Theme ─────────────────────────────────────────────────────
if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
function toggleTheme() {
    const d = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    if (d === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme', d);
}

// ─── Settings toggle ───────────────────────────────────────────
function toggleSettings() {
    $('settingsToggle').classList.toggle('open');
    $('settingsBody').classList.toggle('open');
}

// ─── WebSocket ─────────────────────────────────────────────────
function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/logs`);
    ws.onmessage = e => { const d = JSON.parse(e.data); if (d.type === 'log') appendLog(d.message); };
    ws.onclose = () => setTimeout(connectWS, 2000);
}

function appendLog(msg) {
    let color = '';
    const lowerMsg = msg.toLowerCase();

    if (lowerMsg.includes('error') || lowerMsg.includes('failed') || lowerMsg.includes('✗')) {
        color = 'color: #ff5555;'; // Red for errors
    } else if (lowerMsg.includes('warning') || lowerMsg.includes('timeout')) {
        color = 'color: #f1fa8c;'; // Yellow for warnings
    } else if (lowerMsg.includes('success') || lowerMsg.includes('done') || lowerMsg.includes('✓')) {
        color = 'color: #50fa7b;'; // Green for success
    } else if (lowerMsg.includes('skip')) {
        color = 'color: #6272a4;'; // Dimmed for skips
    }

    // Escape HTML to prevent injection but allow our span wrapper
    const escapedMsg = msg.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    if (color) {
        logBox.innerHTML += `<span style="${color}">${escapedMsg}</span><br>`;
    } else {
        logBox.innerHTML += `${escapedMsg}<br>`;
    }
    logBox.scrollTop = logBox.scrollHeight;
}

// ─── Config ────────────────────────────────────────────────────
async function loadConfig() {
    try {
        const r = await fetch('/api/config');
        const d = await r.json();
        $('slskUser').value = d.slsk_user || '';
        $('slskPass').value = d.slsk_pass || '';
        $('prefFormat').value = d.preferred_format || 'flac';
        $('acoustidEnabled').checked = d.acoustid_enabled !== false;
        $('acoustidVerify').checked = d.acoustid_verify === true;
        $('acoustidKey').value = d.acoustid_api_key || '';
        $('embedLyrics').checked = d.embed_lyrics === true;
        $('geniusApiKey').value = d.genius_api_key || '';
        $('convertMp3').checked = d.convert_to_mp3 === true;
        $('sentinelEnabled').checked = d.sentinel_enabled === true;
    } catch(e) { console.error(e); }
}

async function saveConfig() {
    try {
        await fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                slsk_user: $('slskUser').value, slsk_pass: $('slskPass').value,
                preferred_format: $('prefFormat').value,
                acoustid_enabled: $('acoustidEnabled').checked,
                acoustid_api_key: $('acoustidKey').value,
                acoustid_verify: $('acoustidVerify').checked,
                embed_lyrics: $('embedLyrics').checked,
                genius_api_key: $('geniusApiKey').value,
                convert_to_mp3: $('convertMp3').checked,
                sentinel_enabled: $('sentinelEnabled').checked
            })
        });
        appendLog('Settings saved.');
    } catch(e) { alert('Error saving settings'); }
}

async function testSearch() {
    const query = prompt('Search query:', 'GMS');
    if (!query) return;
    appendLog('Testing search: "' + query + '"...');
    try {
        const r = await fetch('/api/test_search', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({query}) });
        const d = await r.json();
        if (d.error) {
            appendLog('Search error: ' + d.error);
        } else {
            appendLog('Got ' + d.result_count + ' results for "' + d.query + '"');
            if (d.sample) d.sample.forEach(function(f) { appendLog('  ' + f); });
        }
    } catch(e) { appendLog('Test search failed: ' + e); }
}

// ─── Actions ───────────────────────────────────────────────────
function setButtons(running) {
    $('startBtn').style.display = running ? 'none' : '';
    $('scanBtn').style.display = running ? 'none' : '';
    $('fillBtn').style.display = running ? 'none' : '';
    $('pauseBtn').style.display = running ? '' : 'none';
    $('stopBtn').style.display = running ? '' : 'none';
    const btns = [$('startBtn'), $('scanBtn'), $('fillBtn')];
    btns.forEach(b => b.disabled = running);
}

        function getArtistNames() {
            const raw = $('artistName').value.trim();
            if (!raw) return [];
            return raw.split(',').map(s => s.trim()).filter(s => s.length > 0);
        }

async function startJob(fromReview = false) {
    const artists = getArtistNames();
    if (!artists.length) return alert('Enter at least one artist name.');
    let selection = null;
    if (fromReview) {
        selection = getSelection();
        if (!selection || !selection.length) return alert('No items selected.');
        $('reviewSection').style.display = 'none';
    }
    logBox.innerHTML = '';
    setButtons(true);
    try {
        const r = await fetch('/api/start', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                artist_names: artists, dry_run: $('dryRun').checked,
                depth: parseInt($('relatedDepth').value) || 1, selection
            })
        });
        const d = await r.json();
        if (!r.ok) { alert(d.message); setButtons(false); }
    } catch(e) { alert('Network error'); setButtons(false); }
}

async function scanArtist() {
    const artists = getArtistNames();
    if (!artists.length) return alert('Enter at least one artist name.');
    $('scanBtn').disabled = true;
    appendLog('Scanning metadata...');
    try {
        const r = await fetch('/api/scan', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ artist_names: artists, depth: parseInt($('relatedDepth').value) || 1 })
        });
        const d = await r.json();
        scanResult = d.tree;
        renderTree(scanResult);
        $('reviewSection').style.display = 'block';
        appendLog('Scan complete. Review and select albums.');
    } catch(e) { alert('Scan failed: ' + e); }
    $('scanBtn').disabled = false;
}

async function startAutonomousFill() {
    const artists = getArtistNames();
    if (!artists.length) return alert('Enter at least one artist name.');
    logBox.innerHTML = '';
    setButtons(true);
    try {
        const r = await fetch('/api/autonomous_fill', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ artist_names: artists, depth: parseInt($('relatedDepth').value) || 1, dry_run: $('dryRun').checked })
        });
        const d = await r.json();
        if (!r.ok) { alert(d.message); setButtons(false); }
    } catch(e) { alert('Network error'); setButtons(false); }
}

async function stopJob() {
    await fetch('/api/stop', { method: 'POST' });
    appendLog('Stop requested...');
}

async function togglePause() {
    const r = await fetch('/api/pause', { method: 'POST' });
    const d = await r.json();
    $('pauseBtn').textContent = d.is_paused ? '▶ Resume' : '⏸ Pause';
    $('pauseBtn').className = d.is_paused ? 'btn btn-success' : 'btn btn-warning';
}

async function clearQueue() {
    if (!confirm('Clear download history?')) return;
    await fetch('/api/clear_queue', { method: 'POST' });
    $('completedBody').innerHTML = '';
}

async function loadStats() {
    try {
        const r = await fetch('/api/stats');
        const d = await r.json();
        $('statsText').textContent = `${d.artists} artists · ${d.organized_albums} albums · ${d.flat_files} flat files · ${d.total_audio_files} tracks`;
    } catch(e) {}
}

async function tidyLibrary() {
    if (!confirm('Move flat audio files into artist subfolders?')) return;
    appendLog('Tidying flat files...');
    try {
        const r = await fetch('/api/tidy', { method: 'POST' });
        const d = await r.json();
        appendLog(`Tidy: ${d.moved} moved, ${d.skipped} skipped, ${d.errors} errors.`);
        loadStats();
    } catch(e) { appendLog('Tidy failed: ' + e); }
}

async function cleanupIncomplete() {
    if (!confirm('Remove album folders with fewer than 3 tracks? These are likely failed downloads.')) return;
    appendLog('Cleaning incomplete albums...');
    try {
        const r = await fetch('/api/cleanup_incomplete', { method: 'POST' });
        const d = await r.json();
        appendLog(`Cleaned ${d.cleaned} incomplete folders, freed ${d.freed_mb}MB.`);
        loadStats();
    } catch(e) { appendLog('Cleanup failed: ' + e); }
}

async function deduplicateLibrary() {
    if (!confirm('Remove duplicate files from artist folders that already exist in album subfolders?')) return;
    appendLog('Deduplicating library...');
    try {
        const r = await fetch('/api/deduplicate', { method: 'POST' });
        const d = await r.json();
        appendLog(`Removed ${d.removed} duplicates, freed ${d.freed_mb}MB.`);
        loadStats();
    } catch(e) { appendLog('Dedup failed: ' + e); }
}

async function cleanupEmpty() {
    appendLog('Cleaning empty folders...');
    try {
        const r = await fetch('/api/cleanup_empty', { method: 'POST' });
        const d = await r.json();
        appendLog(`Removed ${d.removed} empty folders.`);
        loadStats();
        loadLibrary();
    } catch(e) { appendLog('Cleanup failed: ' + e); }
}

async function oneClickClean() {
    appendLog('✨ Running full cleanup pipeline...');
    let totalMoved = 0, totalRemoved = 0;
    const steps = [
        ['Organize Albums', '/api/organize_flat', 'moved'],
        ['Organize Root', '/api/organize_root', 'moved'],
        ['Organize by Tags', '/api/organize_by_tags', 'moved'],
        ['Deduplicate', '/api/deduplicate', 'removed'],
        ['Clean Empty', '/api/cleanup_empty', 'removed'],
    ];
    for (const [name, url, key] of steps) {
        try {
            appendLog(`  ${name}...`);
            const r = await fetch(url, { method: 'POST' });
            const d = await r.json();
            const count = d[key] || 0;
            if (key === 'removed') totalRemoved += count;
            else totalMoved += count;
            if (count > 0) appendLog(`    → ${count} files processed`);
        } catch(e) { appendLog(`    ⚠ ${name} failed: ${e}`); }
    }
    appendLog(`✨ Done! ${totalMoved} organized, ${totalRemoved} cleaned.`);
    loadStats();
    loadLibrary();
}

async function organizeAlbums() {
    appendLog('Organizing flat files into album folders...');
    try {
        const r = await fetch('/api/organize_flat', { method: 'POST' });
        const d = await r.json();
        appendLog(`Organized: ${d.moved} moved, ${d.skipped} skipped, ${d.errors} errors`);
        if (d.created && d.created.length > 0) {
            appendLog(`New folders: ${d.created.slice(0, 10).join(', ')}${d.created.length > 10 ? ` ...and ${d.created.length - 10} more` : ''}`);
        }
        loadStats();
        loadLibrary();
    } catch(e) { appendLog('Organize failed: ' + e); }
}

async function organizeRoot() {
    appendLog('Organizing root-level files into artist/album folders...');
    try {
        const r = await fetch('/api/organize_root', { method: 'POST' });
        const d = await r.json();
        appendLog(`Organized root: ${d.moved} moved, ${d.skipped} skipped, ${d.errors} errors`);
        if (d.created && d.created.length > 0) {
            appendLog(`New folders: ${d.created.slice(0, 10).join(', ')}${d.created.length > 10 ? ` ...and ${d.created.length - 10} more` : ''}`);
        }
        loadStats();
        loadLibrary();
    } catch(e) { appendLog('Organize root failed: ' + e); }
}

async function organizeByTags() {
    appendLog('Organizing remaining files by audio metadata tags...');
    try {
        const r = await fetch('/api/organize_by_tags', { method: 'POST' });
        const d = await r.json();
        appendLog(`Tag-organized: ${d.moved} moved, ${d.skipped} skipped, ${d.errors} errors`);
        if (d.created && d.created.length > 0) {
            appendLog(`New folders: ${d.created.slice(0, 10).join(', ')}`);
        }
        loadStats();
        loadLibrary();
    } catch(e) { appendLog('Tag organize failed: ' + e); }
}

async function loadLibrary() {
    try {
        const r = await fetch('/api/library');
        const d = await r.json();
        if (!d.artists || !d.artists.length) {
            $('libraryContent').innerHTML = '<p style="color: var(--text2)">Library is empty.</p>';
            return;
        }
        let html = '';
        d.artists.forEach((artist, idx) => {
            const albumCount = artist.albums.length;
            html += `<div class="artist-entry" onclick="toggleArtist(${idx})" style="cursor: pointer; margin-bottom: 8px; padding: 6px 8px; border-radius: 4px; background: var(--bg2);">`;
            html += `<strong style="font-size: 14px;">📁 ${artist.name}</strong> `;
            html += `<span style="color: var(--text2); font-size: 12px;">${albumCount} album${albumCount !== 1 ? 's' : ''} · ${artist.total_tracks} tracks</span>`;
            html += `<div id="artist-${idx}" style="display: none; margin-top: 8px; margin-left: 20px;">`;
            artist.albums.forEach(album => {
                html += `<div style="font-size: 13px; padding: 3px 0; border-bottom: 1px solid var(--border);">🎵 ${album.name} <span style="color: var(--text2)">(${album.tracks})</span></div>`;
            });
            html += '</div></div>';
        });
        $('libraryContent').innerHTML = html;
    } catch(e) { $('libraryContent').innerHTML = '<p style="color: red">Error loading library.</p>'; }
}

function toggleArtist(idx) {
    const el = $('artist-' + idx);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ─── Tree rendering ────────────────────────────────────────────
function renderTree(tree) {
    if (!tree) { $('treeRoot').innerHTML = 'No results.'; return; }
    let html = '<ul>';
    tree.forEach((artist, ai) => {
        html += `<li><label><input type="checkbox" checked onchange="toggleArtist(${ai})"> <span class="artist-name">${artist.name}</span></label><ul>`;
        artist.albums.forEach(album => {
            const chk = album.exists_locally ? '' : 'checked';
            const cls = album.exists_locally ? 'exists' : '';
            const badge = album.exists_locally ? `<span class="badge-sm">${album.track_count || 0} on disk</span>` : '';
            html += `<li class="${cls}"><label><input type="checkbox" ${chk} class="album-check-${ai}" value="${album.id}"> ${album.year} - ${album.title}${badge}</label></li>`;
        });
        html += '</ul></li>';
    });
    html += '</ul>';
    $('treeRoot').innerHTML = html;
}

window.toggleArtist = function(i) {
    const on = document.querySelector(`#treeRoot input[type="checkbox"]`).checked; // artist checkbox
    document.querySelectorAll(`.album-check-${i}`).forEach(cb => {
        // Find the artist checkbox for this group
    });
    // Simpler: just find the artist checkbox by its position
    const artistCb = $('treeRoot').querySelectorAll('ul > li > label > input[type="checkbox"]')[i];
    document.querySelectorAll(`.album-check-${i}`).forEach(cb => cb.checked = artistCb.checked);
};

function getSelection() {
    if (!scanResult) return null;
    const sel = [];
    scanResult.forEach((artist, ai) => {
        const albums = [];
        document.querySelectorAll(`.album-check-${ai}`).forEach(cb => {
            if (cb.checked) {
                const orig = artist.albums.find(a => a.id === cb.value);
                if (orig) albums.push(orig);
            }
        });
        if (albums.length) sel.push({ id: artist.id, name: artist.name, albums });
    });
    return sel;
}

// ─── Status Polling ────────────────────────────────────────────
async function pollStatus() {
    try {
        const r = await fetch('/api/status');
        if (!r.ok) return;
        const d = await r.json();

        // Status bar
        if (d.is_paused) {
            statusDot.className = 'status-dot paused';
            statusText.textContent = 'Paused';
        } else if (d.is_running) {
            statusDot.className = 'status-dot active';
            statusText.textContent = 'Running...';
        } else {
            statusDot.className = 'status-dot';
            statusText.textContent = 'Idle';
        }

        if (!d.is_running && $('startBtn').style.display === 'none') {
            setButtons(false);
        }

        // Progress
        const progCard = $('progressCard');
        if (d.progress && d.progress.length) {
            progCard.style.display = '';
            $('progressContainer').innerHTML = d.progress.map(p => `
                <div class="progress-item">
                    <div class="progress-header"><span>${p.artist} \u2014 ${p.album}</span><span>${p.text} (${p.percent}%) ${p.eta}</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${p.percent}%"></div></div>
                </div>`).join('');
        } else {
            progCard.style.display = 'none';
        }

        // Completed table
        if (d.completed_albums && d.completed_albums.length) {
            $('completedBody').innerHTML = [...d.completed_albums].reverse().map(a => {
                const statusClass = a.status === 'Existing' ? 'color:var(--text2)' : a.status === 'Downloaded' ? 'color:var(--success);font-weight:600' : '';
                return `<tr><td>${a.artist}</td><td>${a.album}</td><td>${a.year}</td><td style="${statusClass}">${a.status}</td></tr>`;
            }).join('');
        }

    } catch(e) { console.error(e); }
}

// ─── Init ──────────────────────────────────────────────────────
loadConfig();
connectWS();
loadStats();
setInterval(pollStatus, 2000);
</script>
