name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r discography_webapp/requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Mypy Type Checking
        run: mypy discography_webapp/ --ignore-missing-imports || true

      - name: Run Pytest
        run: PYTHONPATH=. pytest tests/ --cov=discography_webapp

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Test Docker Build
        run: docker build -t app-discography-downloader .
